<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>RDM-7 — Race-grade dash. Half the price.</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;0,700;1,700;1,900&family=JetBrains+Mono:wght@400;500;600;700&family=Fraunces:ital,wght@0,400;0,500;0,700;1,500;1,700&family=Barlow+Condensed:wght@500;700&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;background:#f4f3ef;font-family:"IBM Plex Sans",sans-serif;color:#0a0a0a;}
  *{box-sizing:border-box;}
  button{font-family:inherit;cursor:pointer;}
  .tweaks{position:fixed;bottom:20px;right:20px;z-index:100;background:#0a0a0a;color:#f5f5f5;font-family:"JetBrains Mono",monospace;font-size:11px;padding:16px;width:240px;box-shadow:0 20px 40px rgba(0,0,0,.3);border:1px solid #222;display:none;}
  .tweaks.open{display:block;}
  .tweaks h3{margin:0 0 12px;font-size:11px;letter-spacing:3px;font-weight:600;}
  .tweaks .row{margin:10px 0 6px;letter-spacing:1.5px;color:rgba(255,255,255,.6);text-transform:uppercase;}
  .tweaks .sw{width:22px;height:22px;border-radius:50%;border:2px solid transparent;cursor:pointer;display:inline-block;margin-right:6px;}
  .tweaks .sw.active{border-color:#fff;}
  .tweaks .seg{background:#1a1a1a;color:#fff;border:1px solid #333;padding:4px 8px;font-family:inherit;font-size:10px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;margin-right:4px;}
  .tweaks .seg.active{background:#fff;color:#000;}
  @keyframes rdm-marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}
</style>
</head>
<body>
<div id="root"></div>

<script>
  window.__TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{"accent":"#ef1f2a","theme":"light","typePreset":"technical"}/*EDITMODE-END*/;
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components/rdmLogo.jsx"></script>
<script type="text/babel" src="components/dashboard.jsx"></script>
<script type="text/babel" src="components/screenRDM7.jsx"></script>
<script type="text/babel" src="components/dashScreens.jsx"></script>
<script type="text/babel" src="pages/apexPage.jsx"></script>

<script type="text/babel">
const ACCENTS=[
  {id:'red',value:'#ef1f2a'},
  {id:'white',value:'#f5f5f5'},
  {id:'cyan',value:'#00d4ff'},
  {id:'lime',value:'#c6ff00'},
  {id:'orange',value:'#ff6a00'},
];
function App(){
  const [open,setOpen]=React.useState(false);
  const [accent,setAccent]=React.useState(window.__TWEAK_DEFAULTS.accent);
  const [theme,setTheme]=React.useState(window.__TWEAK_DEFAULTS.theme);
  const [typePreset,setTypePreset]=React.useState(window.__TWEAK_DEFAULTS.typePreset);
  React.useEffect(()=>{
    const h=e=>{
      if(!e.data||typeof e.data!=='object')return;
      if(e.data.type==='__activate_edit_mode')setOpen(true);
      if(e.data.type==='__deactivate_edit_mode')setOpen(false);
    };
    window.addEventListener('message',h);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return()=>window.removeEventListener('message',h);
  },[]);
  const persist=(k,v)=>window.parent.postMessage({type:'__edit_mode_set_keys',edits:{[k]:v}},'*');
  return(<>
    <ApexPage accent={accent} theme={theme} typePreset={typePreset}/>
    <div className={'tweaks'+(open?' open':'')}>
      <h3>TWEAKS</h3>
      <div className="row">Accent</div>
      {ACCENTS.map(a=>(<span key={a.id} className={'sw'+(accent===a.value?' active':'')} style={{background:a.value}} onClick={()=>{setAccent(a.value);persist('accent',a.value);}}/>))}
      <div className="row">Theme</div>
      {['dark','light'].map(m=>(<button key={m} className={'seg'+(theme===m?' active':'')} onClick={()=>{setTheme(m);persist('theme',m);}}>{m}</button>))}
      <div className="row">Typography</div>
      {['technical','editorial','performance'].map(tp=>(<button key={tp} className={'seg'+(typePreset===tp?' active':'')} onClick={()=>{setTypePreset(tp);persist('typePreset',tp);}}>{tp.slice(0,4)}</button>))}
    </div>
  </>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
